name: flutter_preintern_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  adaptive_theme: ^3.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - asset/img/
    - asset/img/icon/
    - asset/img/icon/lang/
    - asset/img/logo/
    - asset/img/deco/
    - asset/img/logo/external/
  fonts:
    - family: VarelaRound
      fonts:
        - asset: asset/font/Varela_Round/VarelaRound-Regular.ttf